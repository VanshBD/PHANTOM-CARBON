<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background circle -->
  <circle cx="50" cy="50" r="50" fill="#0a0e1a"/>
  
  <!-- Ghost body -->
  <g fill="#22c55e" stroke="#22c55e" stroke-width="1">
    <!-- Ghost body path: rounded head + flowing bottom -->
    <path d="
      M 30 55
      C 30 35, 70 35, 70 55
      L 70 72
      C 70 72, 63 68, 57 72
      C 57 72, 53 76, 50 72
      C 50 72, 47 68, 43 72
      C 43 72, 37 68, 30 72
      Z
    " fill="#22c55e" stroke="none"/>
    
    <!-- Left eye -->
    <ellipse cx="41" cy="52" rx="5" ry="6" fill="#0a0e1a"/>
    
    <!-- Right eye -->
    <ellipse cx="59" cy="52" rx="5" ry="6" fill="#0a0e1a"/>
    
    <!-- Mouth dot -->
    <circle cx="50" cy="62" r="2.5" fill="#0a0e1a"/>
  </g>
</svg>
